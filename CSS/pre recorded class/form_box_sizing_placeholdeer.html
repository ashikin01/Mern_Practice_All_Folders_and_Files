<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/form_box_sizing_placeholdeer.css">
</head>
<body>
    
    <form action="">
        <label for="name">আপনার নামঃ </label>
        <input type="text" id="name" placeholder="আপনার নাম লিখুন">

        <label for="email">আপনার ইমেইল লিখুনঃ </label>
        <input type="email" id="email" placeholder="আপনার ইমেইল লিখুন">

        <label for="password">আপনার পাসওয়ার্ড লিখুনঃ </label>
        <input type="password" id="password" placeholder="আপনার পাসওয়ার্ড লিখুন">

        <button type="submit">সাবমিট করুন</button>
    </form>
</body>
</html>
