<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center">HTML Table</h1>

    <table border="1" align="center">
        <caption>Employee Attendance</caption>
        <thead style="background-color: blue;">
            <th>Name</th>
            <th>Days Present</th>
            <th>Days Absent</th>
        </thead>

        <tbody style="background-color: red;">

            <tr>
            <td rowspan="2">Raihan</td>
            <td>26</td>
            <td>5</td>
            </tr>

            <tr>
                <td>27</td>
                <td>55</td>
            </tr>

            <tr>
                <td>Samira</td>
                <td colspan="2" align="center">28</td>              
            </tr>

        </tbody>

        <tfoot style="background-color: yellow;">
            
            <tr>
                <td colspan="3">Data updated: Aug 1, 2025</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
