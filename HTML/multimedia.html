<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Multimedia</h1>

    <h3>Image</h3>

    <img src="/images/cat.jpg" alt="Cat Picture">

    <h3>audio</h3>
    <audio controls>
        <source src="./audio/test.mp4" type="audio/mp3">
        your browser doesn't support audio playback
    </audio>

    <h4>Video</h4>
    <video controls autoplay loop width="400" height="300" poster="/thumbnail/test.jpg" >
        <source src="/video/test.mp4" type="video/mp4">
    </video>

</body>
</html>
